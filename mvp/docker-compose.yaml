services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:18-alpine
    container_name: local-postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - localnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible local storage) ─────────────────────────────────────
  minio:
    image: docker.io/minio/minio:latest
    container_name: local-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console  →  open http://localhost:9001 to browse files
    volumes:
      - miniodata:/data
    networks:
      - localnet
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── DeepFace (face recognition microservice) ─────────────────────────────────
  # https://github.com/serengil/deepface
  # Internally listens on port 5000, we keep that mapping here.
  # NOTE: First startup downloads model weights (~300 MB) — be patient.
  deepface:
    image: docker.io/serengil/deepface:latest
    container_name: deepface
    ports:
      - "5000:5000"
    networks:
      - localnet

  # ── PhotoMe Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./photome-backend
      dockerfile: Dockerfile
    container_name: photome-backend
    ports:
      - "8000:8000"
    environment:
      # Database — use service name "postgres" as host inside Docker network
      DATABASE_URL: postgresql://myuser:mypassword@postgres:5432/mydb

      # Auth
      SECRET_KEY: replace_this_with_a_real_secret_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"

      # MinIO — use service name "minio" as host inside Docker network
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: photome
      S3_REGION: us-east-1

      # DeepFace — use service name "deepface" as host inside Docker network
      DEEPFACE_URL: http://deepface:5000
      DEEPFACE_MODEL: Facenet512
      DEEPFACE_DETECTOR: opencv
      DEEPFACE_DISTANCE_THRESHOLD: "0.4"

      # App
      APP_NAME: PhotoMe
      DEBUG: "true"
      UPLOAD_THRESHOLD: "5"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      deepface:
        condition: service_started
    networks:
      - localnet
    # Runs migrations then starts the server
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
  miniodata:

networks:
  localnet:
    driver: bridge