services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:18-alpine
    container_name: local-postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - localnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible local storage) ─────────────────────────────────────
  minio:
    image: docker.io/minio/minio:latest
    container_name: local-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console → http://localhost:9001
    volumes:
      - miniodata:/data
    networks:
      - localnet
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── DeepFace ────────────────────────────────────────────────────────────────
  deepface:
    image: docker.io/serengil/deepface:latest
    container_name: deepface
    ports:
      - "5001:5000"
    networks:
      - localnet
    volumes:
      - ./photome-backend/weights:/root/.deepface/weights

  # ── PhotoMe Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./photome-backend
      dockerfile: Dockerfile
    container_name: photome-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://myuser:mypassword@postgres:5432/mydb
      SECRET_KEY: replace_this_with_a_real_secret_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: photome
      S3_REGION: us-east-1
      DEEPFACE_URL: http://deepface:5000
      DEEPFACE_MODEL: Facenet512
      DEEPFACE_DETECTOR: opencv
      DEEPFACE_DISTANCE_THRESHOLD: "0.4"
      APP_NAME: PhotoMe
      DEBUG: "true"
      UPLOAD_THRESHOLD: "5"
      SHOTSTACK_API_KEY: "O7WqW5TONTWAcr8o9EODITc65wgx5ksOZ2uWhCTW"
      SHOTSTACK_ENV: "stage"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      deepface:
        condition: service_started
    networks:
      - localnet
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ── Expo Frontend (web) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./photome-frontend
      dockerfile: Dockerfile
    container_name: photome-frontend
    ports:
      - "8082:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      # Tells the Expo web build where the API lives.
      # From the browser's perspective the backend is on localhost:8000.
      EXPO_PUBLIC_API_URL: http://localhost:8000/api/v1
      # Needed for file-watching inside Docker on Linux/Windows
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    networks:
      - localnet

volumes:
  pgdata:
  miniodata:
  deepface_weights:

networks:
  localnet:
    driver: bridge
